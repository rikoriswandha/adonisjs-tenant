name: checks

on:
  - push
  - pull_request
  - workflow_call

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # v4.0.3
      - uses: actions/setup-node@1e60f620b9541d2ab18bd2f7672f6c50420cf4b0
        with:
          node-version: 24
      - name: Install
        run: npm ci
      - name: Run lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      # v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # v4.0.3
      - uses: actions/setup-node@1e60f620b9541d2ab18bd2f7672f6c50420cf4b0
        with:
          node-version: 24
      - name: Install
        run: npm ci
      - name: Run typecheck
        run: npm run typecheck

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [24]
    steps:
      # v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Use Node.js ${{ matrix.node-version }}
        # v4.0.3
        uses: actions/setup-node@1e60f620b9541d2ab18bd2f7672f6c50420cf4b0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: npm ci
      - name: Run tests
        run: npm test

  package:
    runs-on: ubuntu-latest
    steps:
      # v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # v4.0.3
      - uses: actions/setup-node@1e60f620b9541d2ab18bd2f7672f6c50420cf4b0
        with:
          node-version: 24
      - name: Install
        run: npm ci
      - name: Verify packed consumer artifact
        run: npm run verify:package
      - name: Audit dependency graph
        run: npm audit --audit-level=high
